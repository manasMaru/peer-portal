<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resources</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2>Resources</h2>

    <!-- ADD RESOURCE -->
    <div class="box">
      <input type="text" id="rTitle" placeholder="Resource title" />
      <textarea id="rDesc" placeholder="Description"></textarea>

      <select id="rType" onchange="toggleFields()">
        <option value="">Select type</option>
        <option value="physical">Physical</option>
        <option value="digital">Digital</option>
      </select>

      <!-- DIGITAL -->
      <input
        type="text"
        id="rLink"
        placeholder="Resource link (PDF / Drive)"
        class="hidden"
      />

      <!-- PHYSICAL -->
      <input
        type="text"
        id="rImage"
        placeholder="Image URL of product"
        class="hidden"
      />
      <input
        type="text"
        id="rContact"
        placeholder="Contact details (Phone / Email)"
        class="hidden"
      />

      <button onclick="addResource()">Add Resource</button>
    </div>

    <hr />

    <!-- FILTER BUTTONS -->
    <div class="box resource-filters">
      <button
        class="filter-btn active"
        onclick="setActiveFilter(this, '')"
      >
        All
      </button>
      <button
        class="filter-btn"
        onclick="setActiveFilter(this, 'physical')"
      >
        Physical
      </button>
      <button
        class="filter-btn"
        onclick="setActiveFilter(this, 'digital')"
      >
        Digital
      </button>
    </div>

    <!-- LIST -->
    <div id="resourceList"></div>

    <br />
    <button onclick="goBack()">⬅ Back to Dashboard</button>
  </div>

  <!-- IMPORTANT: only resources.js is needed -->
  <script src="./resources.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resources</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div class="container">
    <h2>Resources</h2>

    <!-- ADD RESOURCE -->
    <div class="box">
      <input type="text" id="rTitle" placeholder="Resource title" />
      <textarea id="rDesc" placeholder="Description"></textarea>

      <select id="rType">
        <option value="">Select type</option>
        <option value="physical">Physical</option>
        <option value="digital">Digital</option>
      </select>

      <!-- DIGITAL -->
      <input
        type="text"
        id="rLink"
        placeholder="Resource link (PDF / Drive)"
        class="hidden"
      />

      <!-- PHYSICAL -->
      <input
        type="text"
        id="rImage"
        placeholder="Image URL of product"
        class="hidden"
      />
      <input
        type="text"
        id="rContact"
        placeholder="Contact details (Phone / Email)"
        class="hidden"
      />

      <button id="addResourceBtn">Add Resource</button>
    </div>

    <hr />

    <!-- FILTER BUTTONS -->
    <div class="box resource-filters">
      <button class="filter-btn active" data-type="">All</button>
      <button class="filter-btn" data-type="physical">Physical</button>
      <button class="filter-btn" data-type="digital">Digital</button>
    </div>

    <!-- LIST -->
    <div id="resourceList"></div>

    <br />
    <button id="backBtn">⬅ Back to Dashboard</button>
  </div>

  <script type="module" src="./js/resources.js"></script>
</body>
</html>

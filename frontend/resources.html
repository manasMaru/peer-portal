<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resources</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/resources.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="page-card">

      <!-- ================= HEADER ================= -->
      <div class="page-header">
        <h2>📚 Resources</h2>
        <p class="subtitle">
          Share knowledge. Help others. Grow together.
        </p>
      </div>

      <!-- ================= TOGGLE ================= -->
      <div class="resource-toggle">
        <button id="showResourcesBtn" class="active">
          Available Resources
        </button>
        <button id="showRequestsBtn">
          Resource Requests
        </button>
      </div>

      <!-- ===================================================== -->
      <!-- ================= AVAILABLE RESOURCES ================ -->
      <!-- ===================================================== -->
      <div id="resourceSection">

        <!-- ===== Add Resource Form ===== -->
        <div class="resource-form">
          <h3>Add Resource</h3>

          <input type="text" id="rTitle" placeholder="Resource title" />
          <textarea id="rDesc" placeholder="Description"></textarea>

          <select id="rType">
            <option value="">Select type</option>
            <option value="physical">Physical</option>
            <option value="digital">Digital</option>
          </select>

          <!-- Digital -->
          <input
            type="text"
            id="rLink"
            placeholder="Resource link (PDF / Drive)"
            class="hidden"
          />

          <!-- Physical -->
          <input
            type="text"
            id="rImage"
            placeholder="Image URL of product"
            class="hidden"
          />

          <input
            type="text"
            id="rContact"
            placeholder="Contact details (Phone / Email)"
            class="hidden"
          />

          <button id="addResourceBtn" class="primary-btn">
            Add Resource
          </button>
        </div>

        <!-- ===== Filter Buttons ===== -->
        <div class="resource-filters">
          <button class="filter-btn active" data-type="">All</button>
          <button class="filter-btn" data-type="physical">Physical</button>
          <button class="filter-btn" data-type="digital">Digital</button>
        </div>

        <!-- ===== Resource List ===== -->
        <div id="resourceList" class="resource-list"></div>

      </div>

      <!-- ===================================================== -->
      <!-- ================= RESOURCE REQUESTS ================= -->
      <!-- ===================================================== -->
      <div id="requestSection" class="hidden">

        <div class="resource-form">
          <h3>Request a Resource</h3>

          <input
            type="text"
            id="reqTitle"
            placeholder="Requested resource title"
          />

          <textarea
            id="reqDesc"
            placeholder="Describe what you need"
          ></textarea>

          <select id="reqType">
            <option value="">Select type</option>
            <option value="physical">Physical</option>
            <option value="digital">Digital</option>
          </select>

          <input
            type="text"
            id="reqImage"
            placeholder="Optional image link"
          />

          <input
            type="text"
            id="reqContact"
            placeholder="Your contact details (Phone / Email)"
          />

          <button id="addRequestBtn" class="primary-btn">
            Add Request
          </button>
        </div>

        <div id="requestList" class="resource-list"></div>

      </div>

      <!-- ================= BACK BUTTON ================= -->
      <div class="back-section">
        <button id="backBtn" class="secondary-btn">
          ⬅ Back to Dashboard
        </button>
      </div>

    </div>

  </div>

  <script type="module" src="./js/resources.js"></script>
</body>
</html>
